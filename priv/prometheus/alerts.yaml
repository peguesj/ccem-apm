groups:
  - name: ccem_apm_governance
    rules:
      - alert: FormationFailureRateHigh
        expr: rate(ccem_formation_failures_total[5m]) / rate(ccem_formation_completions_total[5m]) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Formation failure rate above 5% threshold"
          description: >
            Formation failure rate is {{ $value | humanizePercentage }} over the last 5 minutes.
            Threshold: 5%. Investigate formation logs for root cause.
          runbook_url: "http://localhost:3032/plugins/harness"

      - alert: TokenBudgetExhaustionImminent
        expr: ccem_token_budget_consumed / ccem_token_budget_total > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Token budget is more than 80% consumed"
          description: >
            Token budget consumption is at {{ $value | humanizePercentage }}.
            Consider pausing non-critical agents or expanding the budget.
          runbook_url: "http://localhost:3032/measure/usage"

      - alert: AgentRegistrationRateSpike
        expr: rate(ccem_agent_registrations_total[1m]) > 50
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "Unusually high agent registration rate"
          description: >
            Agent registration rate is {{ $value }} per second over the last minute.
            This may indicate a formation spawn storm. Current formations visible at
            http://localhost:3032/observe/formations.
          runbook_url: "http://localhost:3032/observe/formations"

      - alert: AuditLogWriteStalled
        expr: increase(ccem_audit_events_total[5m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "No audit log events written in last 15 minutes"
          description: >
            The CCEM APM audit log has not received any events for 15 minutes.
            The AuditLog GenServer may be stalled. Check APM supervisor health.
          runbook_url: "http://localhost:3032/observe/sessions"

      - alert: ApprovalQueueBacklog
        expr: ccem_approval_queue_depth > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Approval queue has more than 20 pending items"
          description: >
            Approval queue depth is {{ $value }}. Pending approvals are blocking
            agent execution. Review via http://localhost:3032/govern/approvals.
          runbook_url: "http://localhost:3032/govern/approvals"
