<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LFG — Local File Guardian Showcase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #09090b; overflow: hidden; }
    iframe { width: 100%; height: 100vh; border: none; display: block; }
    .fallback {
      display: none;
      position: fixed; inset: 0; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; background: #09090b; color: #a1a1aa;
      font-family: ui-monospace, monospace; font-size: 12px;
    }
    .fallback.show { display: flex; }
    .fallback a { color: #a855f7; text-decoration: none; }
    .fallback a:hover { color: #c084fc; }
    .fallback code { background: #18181b; padding: 2px 6px; border-radius: 3px; color: #e4e4e7; }
  </style>
</head>
<body>
  <iframe
    id="showcase-frame"
    src="http://localhost:8080/lfg.html"
    title="LFG — Local File Guardian Showcase"
    sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
    loading="lazy"
  ></iframe>
  <div class="fallback" id="fallback">
    <span style="color:#ef4444">showcase server offline</span>
    <span>standalone showcase not running on <code>localhost:8080</code></span>
    <span>start with: <code>cd ~/Developer/ccem/showcase/client && python3 -m http.server 8080</code></span>
    <a href="http://localhost:8080/lfg.html" target="_blank">open directly →</a>
    <span style="margin-top:8px;color:#52525b">or view in APM: <a href="http://localhost:3032/showcase?project=lfg">localhost:3032/showcase?project=lfg</a></span>
  </div>
  <script>
    const frame = document.getElementById('showcase-frame');
    const fallback = document.getElementById('fallback');
    frame.addEventListener('error', () => { frame.style.display = 'none'; fallback.classList.add('show'); });
    const t = setTimeout(() => {
      try {
        const doc = frame.contentDocument;
        if (!doc || !doc.body) throw new Error('empty');
      } catch (e) {
        if (e.name !== 'SecurityError') {
          frame.style.display = 'none';
          fallback.classList.add('show');
        }
      }
    }, 4000);
    frame.addEventListener('load', () => clearTimeout(t));
  </script>
</body>
</html>
